steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aeyes-cloud-agent:${BUILD_ID}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aeyes-cloud-agent:${BUILD_ID}
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - aeyes-cloud-agent
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aeyes-cloud-agent:${BUILD_ID}
      - --region=${_REGION}
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GEMINI_API_KEY=${_GEMINI_API_KEY}

substitutions:
  _REGION: us-central1
  _GEMINI_API_KEY: ""
